name: Daily Health Check

on:
  schedule:
    - cron: '0 3 * * *'  # 8:30am IST daily
  workflow_dispatch:       # allow manual trigger

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip wheel
          pip install pandas>=2.0.0
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium --with-deps
          python -c "import pandas; print(f'pandas {pandas.__version__} OK')"

      - name: Import check
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0, '.')

          # Check core modules load without error
          import pandas
          import flask
          import groq
          import requests
          from dotenv import load_dotenv
          print(f'Core deps OK: pandas={pandas.__version__}, flask={flask.__version__}')

          # Check our modules import
          from groq_analyzer import GroqAnalyzer
          from job_automation.feedback import init_feedback_db
          from job_automation.salary_filter import extract_salary_lpa
          import platform_filter
          print('job_automation modules OK')
          "

      - name: Scoring config check
        run: |
          python3 -c "
          import json
          config = json.load(open('scoring_config.json'))
          print(f'scoring_config.json v{config[\"version\"]} loaded OK')
          assert config['version'] >= 1
          "
